<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ThriftSnap — Vinted Listing Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f8f9fb;
            --surface: #ffffff;
            --surface-alt: #f1f3f6;
            --text: #1a1d23;
            --text-secondary: #5f6570;
            --text-tertiary: #949ba6;
            --accent: #0171e3;
            --accent-light: #e8f2fd;
            --accent-gradient: linear-gradient(135deg, #0171e3 0%, #5b4dff 50%, #8b3dff 100%);
            --success: #0ec97e;
            --success-bg: #e6faf1;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --border: #e2e5ea;
            --border-light: #eef0f4;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --radius-lg: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background-image:
                radial-gradient(ellipse at 15% 20%, rgba(1, 113, 227, 0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 85% 75%, rgba(139, 61, 255, 0.03) 0%, transparent 60%);
        }

        .app-container {
            width: 100%;
            max-width: 820px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        .settings-toggle {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            color: var(--text-tertiary);
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }
        .settings-toggle:hover { color: var(--accent); border-color: var(--accent); }
        .settings-toggle.has-key { color: var(--success); border-color: var(--success); background: var(--success-bg); }

        .settings-panel {
            display: none;
            position: absolute;
            top: 48px;
            right: 0;
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid var(--border-light);
            z-index: 20;
            width: 300px;
            flex-direction: column;
            gap: 12px;
        }
        .settings-panel.active { display: flex; }
        .settings-panel label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-secondary); }
        .settings-panel .input-row { display: flex; gap: 8px; }
        .settings-panel input, .settings-panel select {
            flex: 1; padding: 10px 12px; border-radius: 20px; border: 1.5px solid var(--border);
            font-family: 'Inter', sans-serif; font-size: 0.85rem; background: var(--surface-alt); color: var(--text); outline: none;
        }
        .settings-panel input:focus { border-color: var(--accent); }
        .settings-panel .save-btn {
            padding: 10px 16px; border-radius: 20px; background: var(--accent); color: #fff; border: none; cursor: pointer;
            font-weight: 600; font-size: 0.8rem; font-family: 'Inter', sans-serif; white-space: nowrap;
        }
        .settings-hint { font-size: 0.7rem; color: var(--text-tertiary); line-height: 1.5; }
        .settings-hint a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .settings-status { font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .settings-status.success { color: var(--success); }

        .header { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; padding-right: 48px; }
        .logo {
            display: inline-flex; align-items: center; gap: 8px; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em;
            background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .logo-icon {
            width: 40px; height: 40px; background: var(--accent-gradient); border-radius: 12px; display: flex;
            align-items: center; justify-content: center; font-size: 1.1rem; color: #fff; -webkit-text-fill-color: #fff;
            box-shadow: 0 6px 18px rgba(1, 113, 227, 0.3);
        }
        .subtitle { font-size: 0.85rem; color: var(--text-secondary); }

        .upload-zone {
            background: var(--surface); border: 2px dashed var(--border); border-radius: var(--radius-lg);
            padding: 32px 20px; text-align: center; cursor: pointer; transition: all var(--transition);
            box-shadow: var(--shadow-sm); display: flex; flex-direction: column; align-items: center; gap: 12px;
            min-height: 180px; justify-content: center;
        }
        .upload-zone:hover { border-color: var(--accent); box-shadow: var(--shadow); }
        .upload-zone.drag-over { border-color: var(--accent); background: var(--accent-light); }
        .upload-zone.has-image { border-style: solid; border-color: var(--border-light); padding: 16px; gap: 12px; background: var(--surface-alt); }
        .upload-zone input[type="file"] { display: none; }
        .upload-icon-circle {
            width: 56px; height: 56px; border-radius: 50%; background: var(--accent-light);
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: var(--accent);
        }
        .upload-title { font-weight: 700; font-size: 1rem; }
        .upload-hint { font-size: 0.8rem; color: var(--text-tertiary); }

        .image-preview-wrapper { position: relative; width: 100%; max-width: 260px; border-radius: var(--radius); overflow: hidden; }
        .image-preview-wrapper img { width: 100%; height: auto; aspect-ratio: 3/4; border-radius: var(--radius); }
        .remove-image-btn {
            position: absolute; top: 8px; right: 8px; width: 30px; height: 30px; border-radius: 50%;
            background: rgba(0,0,0,0.6); color: #fff; border: none; cursor: pointer; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center;
        }

        .analyze-btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 12px 28px;
            background: var(--accent-gradient); color: #fff; border: none; border-radius: 50px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer; box-shadow: 0 8px 24px rgba(1, 113, 227, 0.3);
            font-family: 'Inter', sans-serif; transition: all var(--transition);
        }
        .analyze-btn:disabled { opacity: 0.5; pointer-events: none; }

        .loading-overlay { display: none; flex-direction: column; align-items: center; gap: 12px; }
        .loading-overlay.active { display: flex; }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-banner { display: none; background: var(--danger-bg); border: 1px solid #fecaca; border-radius: var(--radius); padding: 12px 14px; font-size: 0.8rem; color: #991b1b; align-items: flex-start; gap: 8px; flex-direction: column; }
        .error-banner.active { display: flex; }
        .error-banner .retry-link { font-weight: 700; cursor: pointer; text-decoration: underline; align-self: flex-end; }

        .raw-response-box {
            background: #fff; border: 1px solid #fecaca; border-radius: 10px; padding: 12px;
            font-family: monospace; font-size: 0.75rem; max-height: 150px; overflow-y: auto;
            width: 100%; display: none; margin-top: 8px; white-space: pre-wrap; color: #333;
        }
        .raw-response-box.show { display: block; }

        .results-panel { display: none; flex-direction: column; gap: 16px; }
        .results-panel.active { display: flex; }
        .results-header { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.95rem; }
        .badge { font-size: 0.7rem; background: var(--success-bg); color: var(--success); padding: 3px 8px; border-radius: 12px; }
        .ai-badge { font-size: 0.7rem; background: #f3e8ff; color: #7c3aed; padding: 3px 8px; border-radius: 12px; }

        .result-card { background: var(--surface); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); border: 1px solid var(--border-light); }
        .result-card-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .result-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); font-weight: 700; }
        .copy-btn { font-size: 0.75rem; font-weight: 500; color: var(--accent); background: var(--accent-light); border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
        .copy-btn.copied { background: var(--success-bg); color: var(--success); }
        .result-content { font-size: 0.9rem; line-height: 1.5; word-break: break-word; }
        .title-content { font-weight: 700; font-size: 1rem; }

        .tags-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { background: var(--surface-alt); padding: 5px 12px; border-radius: 16px; font-size: 0.75rem; }
        .tag.hashtag { background: #fdf2f8; color: #be185d; }

        .specs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; }
        .spec-item { background: var(--surface-alt); border-radius: var(--radius); padding: 10px 12px; }
        .spec-item .spec-label { font-size: 0.65rem; text-transform: uppercase; color: var(--text-tertiary); font-weight: 600; }
        .spec-item .spec-value { font-weight: 600; font-size: 0.85rem; }

        .price-highlight {
            background: var(--success-bg); padding: 6px 16px; border-radius: 20px;
            font-weight: 700; font-size: 1.1rem; color: #0a7a4d; display: inline-flex; align-items: center; gap: 8px;
        }

        @media (max-width: 640px) {
            .upload-zone { padding: 24px 16px; min-height: 150px; }
            .upload-icon-circle { width: 48px; height: 48px; font-size: 1.2rem; }
            .upload-title { font-size: 0.9rem; }
            .specs-grid { grid-template-columns: repeat(2, 1fr); }
            .logo { font-size: 1.5rem; }
            .logo-icon { width: 34px; height: 34px; font-size: 0.9rem; border-radius: 10px; }
            .header { padding-right: 40px; }
            .settings-panel { width: 260px; right: -5px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <button class="settings-toggle" id="settingsToggle" title="API Key &amp; Model"><i class="fa-solid fa-key"></i></button>
        <div class="settings-panel" id="settingsPanel">
            <label>🔑 Gemini API Key</label>
            <div class="input-row">
                <input type="password" id="apiKeyInput" placeholder="Paste your key...">
                <button class="save-btn" id="saveApiKeyBtn">Save</button>
            </div>
            <label style="margin-top:4px;">⚡ Model</label>
            <select id="modelSelect">
                <option value="gemini-2.5-flash" selected>Gemini 2.5 Flash (recommended)</option>
                <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
                <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
            </select>
            <span class="settings-status idle" id="settingsStatus"><i class="fa-solid fa-circle" style="font-size:0.45rem;"></i> No key saved</span>
            <span class="settings-hint">Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a>. Stored locally.</span>
        </div>

        <div class="header">
            <div class="logo"><span class="logo-icon"><i class="fa-solid fa-bolt"></i></span> ThriftSnap</div>
            <p class="subtitle">Real AI listing — confident &amp; ready for Vinted</p>
        </div>

        <div class="error-banner" id="errorBanner">
            <div style="display: flex; align-items: center; gap: 8px; width: 100%;">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorMessage">Error</span>
                <span class="retry-link" id="retryLink" style="display:none;">Try Again</span>
            </div>
            <div class="raw-response-box" id="rawResponseBox"></div>
        </div>

        <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" accept="image/*">
            <div class="upload-icon-circle" id="uploadIcon"><i class="fa-solid fa-camera"></i></div>
            <div class="upload-title" id="uploadTitle">Drop your photo here</div>
            <div class="upload-hint" id="uploadHint">or tap to browse</div>
            <div class="image-preview-wrapper" id="previewWrapper" style="display: none;">
                <img id="previewImage" src="" alt="Preview">
                <button class="remove-image-btn" id="removeImageBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <button class="analyze-btn" id="analyzeBtn" style="display: none;"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate</button>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <span class="loading-text">Analyzing with AI...</span>
            </div>
        </div>

        <div class="results-panel" id="resultsPanel">
            <div class="results-header">
                <i class="fa-solid fa-circle-check" style="color: var(--success);"></i> Your Listing
                <span class="badge">AI Analyzed</span>
                <span class="ai-badge"><i class="fa-solid fa-sparkles"></i> Gemini 2.5 Flash</span>
            </div>
            <div class="result-card">
                <div class="result-card-header"><span class="result-label">📝 Title</span><button class="copy-btn" data-copy="title"><i class="fa-regular fa-copy"></i> Copy</button></div>
                <div class="result-content title-content" id="titleContent"></div>
            </div>
            <div class="result-card">
                <div class="result-card-header"><span class="result-label">📄 Description</span><button class="copy-btn" data-copy="description"><i class="fa-regular fa-copy"></i> Copy</button></div>
                <div class="result-content" id="descContent"></div>
            </div>
            <div class="result-card">
                <div class="result-card-header"><span class="result-label">🏷️ Details</span></div>
                <div class="specs-grid" id="specsGrid"></div>
            </div>
            <div class="result-card">
                <div class="result-card-header"><span class="result-label">💰 Price</span></div>
                <span class="price-highlight" id="priceHighlight"></span>
                <span class="price-range" id="priceRange"></span>
            </div>
            <div class="result-card">
                <div class="result-card-header"><span class="result-label">#️⃣ Hashtags</span><button class="copy-btn" data-copy="hashtags"><i class="fa-regular fa-copy"></i> Copy</button></div>
                <div class="tags-row" id="hashtagsRow"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const elements = {
                uploadZone: document.getElementById('uploadZone'),
                fileInput: document.getElementById('fileInput'),
                previewWrapper: document.getElementById('previewWrapper'),
                previewImage: document.getElementById('previewImage'),
                removeImageBtn: document.getElementById('removeImageBtn'),
                analyzeBtn: document.getElementById('analyzeBtn'),
                uploadIcon: document.getElementById('uploadIcon'),
                uploadTitle: document.getElementById('uploadTitle'),
                uploadHint: document.getElementById('uploadHint'),
                loadingOverlay: document.getElementById('loadingOverlay'),
                resultsPanel: document.getElementById('resultsPanel'),
                errorBanner: document.getElementById('errorBanner'),
                errorMessage: document.getElementById('errorMessage'),
                retryLink: document.getElementById('retryLink'),
                rawResponseBox: document.getElementById('rawResponseBox'),
                titleContent: document.getElementById('titleContent'),
                descContent: document.getElementById('descContent'),
                specsGrid: document.getElementById('specsGrid'),
                priceHighlight: document.getElementById('priceHighlight'),
                priceRange: document.getElementById('priceRange'),
                hashtagsRow: document.getElementById('hashtagsRow'),
                settingsToggle: document.getElementById('settingsToggle'),
                settingsPanel: document.getElementById('settingsPanel'),
                apiKeyInput: document.getElementById('apiKeyInput'),
                saveApiKeyBtn: document.getElementById('saveApiKeyBtn'),
                settingsStatus: document.getElementById('settingsStatus'),
                modelSelect: document.getElementById('modelSelect'),
            };

            let currentFile = null, resizedBase64 = null, currentListingData = null;
            const GEMINI_API_BASE = 'https://generativelanguage.googleapis.com/v1/models/';

            function getApiKey() { return localStorage.getItem('thriftsnap_gemini_key') || ''; }
            function saveApiKey(key) { localStorage.setItem('thriftsnap_gemini_key', key.trim()); }
            function getSelectedModel() { return elements.modelSelect.value; }

            function updateSettingsUI() {
                const key = getApiKey();
                if (key) {
                    elements.apiKeyInput.value = key;
                    elements.settingsStatus.innerHTML = '<i class="fa-solid fa-circle" style="font-size:0.45rem;color:var(--success);"></i> Key saved ✓';
                    elements.settingsStatus.className = 'settings-status success';
                    elements.settingsToggle.classList.add('has-key');
                } else {
                    elements.apiKeyInput.value = '';
                    elements.settingsStatus.innerHTML = '<i class="fa-solid fa-circle" style="font-size:0.45rem;"></i> No key saved';
                    elements.settingsStatus.className = 'settings-status idle';
                    elements.settingsToggle.classList.remove('has-key');
                }
            }
            updateSettingsUI();

            elements.settingsToggle.addEventListener('click', (e) => { e.stopPropagation(); elements.settingsPanel.classList.toggle('active'); });
            document.addEventListener('click', (e) => {
                if (!elements.settingsPanel.contains(e.target) && e.target !== elements.settingsToggle) elements.settingsPanel.classList.remove('active');
            });
            elements.saveApiKeyBtn.addEventListener('click', () => {
                saveApiKey(elements.apiKeyInput.value);
                updateSettingsUI();
                elements.settingsPanel.classList.remove('active');
                hideError();
            });

            // Drag & Drop
            elements.uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); elements.uploadZone.classList.add('drag-over'); });
            elements.uploadZone.addEventListener('dragleave', () => elements.uploadZone.classList.remove('drag-over'));
            elements.uploadZone.addEventListener('drop', (e) => {
                e.preventDefault(); elements.uploadZone.classList.remove('drag-over');
                if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
            });
            elements.uploadZone.addEventListener('click', (e) => {
                if (e.target === elements.removeImageBtn || elements.removeImageBtn.contains(e.target)) return;
                if (e.target === elements.analyzeBtn || elements.analyzeBtn.contains(e.target)) return;
                if (elements.loadingOverlay.classList.contains('active')) return;
                if (!currentFile) elements.fileInput.click();
            });
            elements.fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });
            elements.removeImageBtn.addEventListener('click', (e) => { e.stopPropagation(); resetUpload(); });
            elements.analyzeBtn.addEventListener('click', (e) => { e.stopPropagation(); if (currentFile) startAnalysis(); });
            elements.retryLink.addEventListener('click', () => { hideError(); if (currentFile) startAnalysis(); });

            function resizeImage(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const maxDim = 1024;
                            if (img.width <= maxDim && img.height <= maxDim) return resolve(e.target.result);
                            const ratio = Math.min(maxDim / img.width, maxDim / img.height);
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width * ratio;
                            canvas.height = img.height * ratio;
                            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.85));
                        };
                        img.onerror = () => reject(new Error('Image load error'));
                        img.src = e.target.result;
                    };
                    reader.onerror = () => reject(new Error('Read error'));
                    reader.readAsDataURL(file);
                });
            }

            function showError(msg, raw = '', showRetry = false) {
                elements.errorMessage.textContent = msg;
                elements.errorBanner.classList.add('active');
                elements.retryLink.style.display = showRetry ? 'inline' : 'none';
                if (raw) {
                    elements.rawResponseBox.textContent = raw;
                    elements.rawResponseBox.classList.add('show');
                } else {
                    elements.rawResponseBox.classList.remove('show');
                }
                elements.loadingOverlay.classList.remove('active');
                if (currentFile) {
                    elements.analyzeBtn.style.display = 'inline-flex';
                    elements.previewWrapper.style.display = 'block';
                    elements.uploadIcon.style.display = 'none';
                    elements.uploadTitle.style.display = 'none';
                    elements.uploadHint.style.display = 'none';
                }
            }
            function hideError() {
                elements.errorBanner.classList.remove('active');
                elements.rawResponseBox.classList.remove('show');
            }

            async function handleFile(file) {
                if (!file.type.startsWith('image/')) { showError('Please use an image file.'); return; }
                hideError(); currentFile = file; resizedBase64 = null; currentListingData = null;
                elements.resultsPanel.classList.remove('active');
                try {
                    resizedBase64 = await resizeImage(file);
                    elements.previewImage.src = resizedBase64;
                    elements.previewWrapper.style.display = 'block';
                    elements.uploadIcon.style.display = 'none';
                    elements.uploadTitle.style.display = 'none';
                    elements.uploadHint.style.display = 'none';
                    elements.analyzeBtn.style.display = 'inline-flex';
                    elements.uploadZone.classList.add('has-image');
                } catch { showError('Cannot process image.'); resetUpload(); }
            }

            function resetUpload() {
                currentFile = null; resizedBase64 = null; currentListingData = null;
                elements.fileInput.value = ''; elements.previewImage.src = '';
                elements.previewWrapper.style.display = 'none';
                elements.uploadIcon.style.display = 'flex';
                elements.uploadTitle.style.display = 'block';
                elements.uploadHint.style.display = 'block';
                elements.analyzeBtn.style.display = 'none';
                elements.uploadZone.classList.remove('has-image');
                elements.loadingOverlay.classList.remove('active');
                elements.resultsPanel.classList.remove('active');
                hideError();
            }

            function buildConfidentPrompt() {
                return `You are a fashion expert. Analyze the clothing item in this image and respond ONLY with a valid JSON object. No markdown, no code fences, no additional text. The response must start with "{" and end with "}".

        Use absolute certainty — never say "likely", "maybe", "might", "appears", "seems".

        Required fields:
        - title: Catchy Vinted listing title. Include item type, descriptors, color, brand.
        - description: 3-5 confident sentences about fabric, cut, style, condition.
        - category: One of [Dresses, Tops, Bottoms, Jackets & Coats, Shoes, Accessories, Skirts, Jumpsuits & Rompers, Activewear, Swimwear, Other]
        - brand: Brand name or "Unbranded"
        - condition: One of [New with tags, Very Good, Good, Fair]
        - color: Descriptive color(s)
        - size: Label size or estimate (XS, S, M, L, XL, XXL)
        - material: Fabric composition
        - style: 3-5 keywords (e.g., "Casual, Minimalist")
        - priceLow: Min resale price in GBP (number)
        - priceHigh: Max resale price in GBP (number)
        - currency: "£"
        - hashtags: Array of 7-10 hashtags without # symbol. Include "vinted", "preloved".`;
            }

            async function callGeminiAPI(apiKey, base64Image, model) {
                const base64Data = base64Image.replace(/^data:image\/\w+;base64,/, '');
                const mimeType = base64Image.match(/^data:(image\/\w+);base64,/)?.[1] || 'image/jpeg';
                const url = `${GEMINI_API_BASE}${model}:generateContent?key=${apiKey}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: buildConfidentPrompt() }, { inline_data: { mime_type: mimeType, data: base64Data } }] }],
                        generationConfig: { temperature: 0.1, topP: 0.9, topK: 40, maxOutputTokens: 1024 }
                    })
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    const msg = err?.error?.message || `API error ${response.status}`;
                    throw new Error(`Gemini API: ${msg}`);
                }
                const data = await response.json();
                const text = data?.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('').trim();
                if (!text) throw new Error('Empty response from AI');
                return text;
            }

            function robustParseJSON(raw) {
                console.log('Raw AI response:', raw); // for debugging
                let cleaned = raw.replace(/```[a-z]*\s*/gi, '').replace(/```/g, '').trim();
                
                // Find first { and last }
                const startIdx = cleaned.indexOf('{');
                const endIdx = cleaned.lastIndexOf('}');
                if (startIdx === -1 || endIdx === -1 || endIdx < startIdx) {
                    throw new Error('No JSON object found in response');
                }
                
                const jsonStr = cleaned.substring(startIdx, endIdx + 1);
                try {
                    return JSON.parse(jsonStr);
                } catch (e) {
                    // Fix common issues
                    let fixed = jsonStr
                        .replace(/,\s*}/g, '}')
                        .replace(/,\s*]/g, ']')
                        .replace(/(['"])?([a-zA-Z0-9_]+)(['"])?\s*:/g, '"$2":')
                        .replace(/:\s*'([^']*)'/g, ':"$1"');
                    try {
                        return JSON.parse(fixed);
                    } catch (e2) {
                        throw new Error('JSON parse failure');
                    }
                }
            }

            function validateListing(item) {
                const required = ['title','description','category','brand','condition','color','size','material','style','priceLow','priceHigh','hashtags'];
                const missing = required.filter(f => !(f in item));
                if (missing.length) throw new Error(`Missing fields: ${missing.join(', ')}`);
                item.priceLow = Number(item.priceLow) || 10;
                item.priceHigh = Number(item.priceHigh) || item.priceLow + 15;
                item.currency = item.currency || '£';
                item.hashtags = item.hashtags.map(h => String(h).toLowerCase().replace(/[^a-z0-9]/g,'')).filter(h => h.length>1);
                return item;
            }

            function populateResults(item) {
                currentListingData = item;
                elements.titleContent.textContent = item.title;
                elements.titleContent.dataset.copyText = item.title;
                const desc = `${item.description}\n\n📏 Size: ${item.size}\n🎨 Colour: ${item.color}\n🧵 Material: ${item.material}\n✨ Condition: ${item.condition}\n🏷️ Brand: ${item.brand}\n👗 Style: ${item.style}\n\n💬 Message me with any questions — happy to bundle!`;
                elements.descContent.textContent = desc;
                elements.descContent.dataset.copyText = desc;
                elements.specsGrid.innerHTML = '';
                const specs = [
                    {label:'Category',value:item.category},{label:'Brand',value:item.brand},
                    {label:'Condition',value:item.condition},{label:'Colour',value:item.color},
                    {label:'Size',value:item.size},{label:'Material',value:item.material},{label:'Style',value:item.style}
                ];
                specs.forEach(s => {
                    const d = document.createElement('div'); d.className='spec-item';
                    d.innerHTML = `<span class="spec-label">${s.label}</span><span class="spec-value">${s.value}</span>`;
                    elements.specsGrid.appendChild(d);
                });
                const priceStr = `${item.currency}${item.priceLow} — ${item.currency}${item.priceHigh}`;
                elements.priceHighlight.textContent = priceStr;
                elements.priceHighlight.dataset.copyText = priceStr;
                elements.priceRange.textContent = '• Based on similar sold listings';
                const hashtags = [...new Set([...item.hashtags,'vinted','preloved'])];
                elements.hashtagsRow.innerHTML = '';
                hashtags.forEach(t => {
                    const span = document.createElement('span'); span.className='tag hashtag'; span.textContent='#'+t;
                    elements.hashtagsRow.appendChild(span);
                });
                elements.hashtagsRow.dataset.copyText = hashtags.map(t=>'#'+t).join(' ');
            }

            async function startAnalysis() {
                const apiKey = getApiKey();
                if (!apiKey) { showError('Add your API key in Settings 🔑'); elements.settingsPanel.classList.add('active'); return; }
                hideError(); elements.resultsPanel.classList.remove('active');
                elements.analyzeBtn.style.display = 'none'; elements.previewWrapper.style.display = 'none';
                elements.uploadIcon.style.display = 'none'; elements.uploadTitle.style.display = 'none';
                elements.uploadHint.style.display = 'none'; elements.loadingOverlay.classList.add('active');
                try {
                    const raw = await callGeminiAPI(apiKey, resizedBase64, getSelectedModel());
                    let parsed;
                    try {
                        parsed = robustParseJSON(raw);
                    } catch (parseErr) {
                        // Show raw response for debugging
                        showError(`Parsing failed: ${parseErr.message}`, raw, true);
                        return;
                    }
                    const validated = validateListing(parsed);
                    populateResults(validated);
                    elements.loadingOverlay.classList.remove('active');
                    elements.previewWrapper.style.display = 'block';
                    elements.analyzeBtn.style.display = 'inline-flex';
                    elements.resultsPanel.classList.add('active');
                    elements.resultsPanel.scrollIntoView({ behavior: 'smooth' });
                } catch (err) {
                    console.error(err);
                    let msg = err.message;
                    if (msg.includes('Failed to fetch')) msg = 'Network error. Check connection.';
                    showError(msg, '', true);
                    elements.previewWrapper.style.display = 'block';
                    elements.analyzeBtn.style.display = 'inline-flex';
                }
            }

            document.addEventListener('click', (e) => {
                const btn = e.target.closest('.copy-btn');
                if (!btn) return;
                const type = btn.dataset.copy;
                let text = '';
                if (type === 'title') text = elements.titleContent.dataset.copyText;
                else if (type === 'description') text = elements.descContent.dataset.copyText;
                else if (type === 'hashtags') text = elements.hashtagsRow.dataset.copyText;
                if (text) navigator.clipboard.writeText(text.trim()).then(() => {
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                    btn.classList.add('copied');
                    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
                });
            });

            resetUpload();
        })();
    </script>
</body>
